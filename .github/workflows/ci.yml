name: Check
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Installs rust + babashka pinned in .mise.toml, matching local dev
      - uses: jdx/mise-action@v3.6.1
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: bb fmt-check
      - name: Linting
        run: bb lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v3.6.1
      - uses: Swatinem/rust-cache@v2
      - name: Tests
        run: bb test
