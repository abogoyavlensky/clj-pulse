name: Release

on:
  push:
    tags: ["*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # The binary reports the Cargo.toml version, so a mismatched tag would
  # publish artifacts that claim a different version than the release.
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify tag matches Cargo.toml version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          if [ "${TAG#v}" != "$version" ]; then
            echo "Tag $TAG does not match Cargo.toml version $version" >&2
            exit 1
          fi

  build:
    needs: version-check
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      # Rust version pinned in .mise.toml, matching local dev and checks;
      # install only rust (babashka isn't needed for release builds).
      # cache off: a mise cache hit restores only a phantom symlink without
      # the ~/.rustup toolchain, so `rustup target add` would fail (see ci.yml)
      - uses: jdx/mise-action@v3.6.1
        with:
          install_args: "rust"
          cache: false

      - name: Add cross-compilation target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compiler (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../clj-pulse-${{ matrix.target }}.tar.gz clj-pulse
          cd ../../..

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/clj-pulse.exe -DestinationPath clj-pulse-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: clj-pulse-${{ matrix.target }}
          path: clj-pulse-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum clj-pulse-* > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            clj-pulse-*
            checksums.txt
